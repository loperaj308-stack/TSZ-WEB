<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecnologías TSZ - SEGURO, PROTEGIDO, PREVALECE</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#0055ff',
                            dark: '#0a0d14',
                            card: '#111622',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">

    <!-- Import Map for React & Lucide -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0?dev",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?dev",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0"
        }
    }
    </script>

    <!-- Babel standalone for in-browser JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-brand-dark text-gray-200 antialiased overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Search, User, Shield, Users, Key, Bell, Plus, MapPin, Map, PlayCircle, Menu, X } from 'lucide-react';

        // --- COMPONENTS ---

        const Nav = () => {
            const [mobileOpen, setMobileOpen] = useState(false);
            return (
                <nav className="fixed w-full z-50 bg-brand-dark/80 backdrop-blur-md border-b border-gray-800/50">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-20">
                            {/* Logo */}
                            <div className="flex-shrink-0 flex items-center gap-2 cursor-pointer">
                                <Shield className="w-8 h-8 text-brand-blue" />
                                <span className="font-display font-bold text-2xl tracking-wide text-white">TSZ</span>
                            </div>
                            
                            {/* Desktop Links */}
                            <div className="hidden md:flex items-center space-x-8">
                                <a href="#" className="font-medium text-gray-300 hover:text-white transition">Inicio</a>
                                <a href="#services" className="font-medium text-gray-300 hover:text-white transition">Servicios</a>
                                <a href="#about" className="font-medium text-gray-300 hover:text-white transition">Sobre nosotros</a>
                                <a href="#contact" className="font-medium text-gray-300 hover:text-white transition">Contacto</a>
                            </div>

                            {/* Icons & Button */}
                            <div className="hidden md:flex items-center space-x-6">
                                <button className="text-gray-400 hover:text-white transition"><Search className="w-5 h-5" /></button>
                                <button className="text-gray-400 hover:text-white transition"><User className="w-5 h-5" /></button>
                                <button className="bg-brand-blue hover:bg-blue-600 text-white px-6 py-2 rounded-full font-medium transition shadow-[0_0_15px_rgba(0,85,255,0.4)]">
                                    Contáctanos
                                </button>
                            </div>

                            {/* Mobile menu button */}
                            <div className="md:hidden flex items-center">
                                <button onClick={() => setMobileOpen(!mobileOpen)} className="text-gray-300">
                                    {mobileOpen ? <X/> : <Menu/>}
                                </button>
                            </div>
                        </div>
                    </div>
                </nav>
            );
        };

        const Hero = () => {
            const [isPlaying, setIsPlaying] = useState(false);
            const videoRef = React.useRef(null);

            const togglePlay = () => {
                if (videoRef.current) {
                    if (isPlaying) {
                        videoRef.current.pause();
                    } else {
                        videoRef.current.play();
                    }
                    setIsPlaying(!isPlaying);
                }
            };

            return (
                <section className="relative pt-24 pb-20 lg:pt-32 lg:pb-32 overflow-hidden border-b border-gray-800">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 pt-10">
                        <div className="grid lg:grid-cols-2 gap-12 items-center">
                            {/* Text Content */}
                            <div className="max-w-3xl">
                                <h4 className="text-brand-blue font-semibold tracking-wider uppercase mb-4 text-sm flex items-center gap-2">
                                    <span className="w-8 h-1 bg-brand-blue block"></span> 
                                    Servicios de Seguridad Premium
                                </h4>
                                <h1 className="font-display font-black text-5xl sm:text-6xl lg:text-7xl leading-tight text-white mb-6">
                                    SEGURO.<br/>PROTEGIDO.<br/>PREVALECE.
                                </h1>
                                <p className="text-gray-400 text-lg mb-10 max-w-xl">
                                    Proporcionamos soluciones de seguridad física y electrónica de primer nivel. Desde cámaras inteligentes con energía solar hasta configuraciones de monitoreo de IA de alto rendimiento.
                                </p>
                                <button onClick={togglePlay} className="bg-brand-blue hover:bg-brand-blue/80 text-white px-8 py-3 rounded-full font-semibold transition-all text-lg flex items-center gap-2 shadow-[0_0_15px_rgba(0,85,255,0.4)]">
                                    <PlayCircle className="w-5 h-5" /> {isPlaying ? 'Pausar Video' : 'Ver Video'}
                                </button>
                            </div>

                            {/* Video side */}
                            <div className="relative rounded-3xl overflow-hidden border border-gray-800 shadow-[0_0_30px_rgba(0,0,0,0.5)] group cursor-pointer aspect-video" onClick={togglePlay}>
                                <div className={`absolute inset-0 bg-black/40 flex items-center justify-center z-10 transition-opacity duration-300 ${isPlaying ? 'opacity-0' : 'opacity-100 group-hover:bg-black/60'}`}>
                                    <PlayCircle className={`w-20 h-20 text-white transition-transform duration-300 ${isPlaying ? 'scale-150 opacity-0' : 'scale-100 opacity-80 group-hover:scale-110'}`} />
                                </div>
                                <video ref={videoRef} loop playsInline className="w-full h-full object-cover">
                                    <source src="Solar/Solar.mp4" type="video/mp4" />
                                </video>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const Services = () => {
            const items = [
                { icon: <Shield className="w-8 h-8 text-brand-blue"/>, title: "Vigilancia y seguridad", desc: "Vigilancia física experta y protección de sitios." },
                { icon: <Users className="w-8 h-8 text-brand-blue"/>, title: "Seguridad de eventos", desc: "Control de multitudes y gestión de accesos integral." },
                { icon: <Key className="w-8 h-8 text-brand-blue"/>, title: "Protección VIP", desc: "Protección ejecutiva discreta y profesional." },
                { icon: <Bell className="w-8 h-8 text-brand-blue"/>, title: "Respuesta rápida", desc: "Soporte técnico 24/7 y reparación de emergencia." },
            ];

            return (
                <section id="services" className="py-24 bg-brand-dark relative">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="text-center mb-16">
                            <h2 className="font-display font-bold text-3xl md:text-4xl text-white mb-4">Servicios de seguridad privada<br/>de la más alta calidad</h2>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 border-b border-gray-800 pb-20">
                            {items.map((item, i) => (
                                <div key={i} className="flex flex-col items-center text-center p-6 group cursor-pointer">
                                    <div className="w-20 h-20 rounded-full bg-brand-card flex items-center justify-center mb-6 group-hover:bg-brand-blue/10 transition duration-300">
                                        {item.icon}
                                    </div>
                                    <h3 className="font-semibold text-xl text-white mb-3">{item.title}</h3>
                                    <p className="text-gray-500 text-sm leading-relaxed">{item.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const ControlCenterFeature = () => {
            return (
                <section className="py-20 relative bg-[#06080c] overflow-hidden">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="grid lg:grid-cols-2 gap-16 items-center">
                            {/* Imagery Side using user's AI laptops as control center proxy */}
                            <div className="relative">
                                <div className="absolute inset-0 bg-brand-blue/20 blur-[100px] rounded-full"></div>
                                <img src="PORTATILES/IA 1.jpg" alt="Control System" className="relative z-10 rounded-2xl shadow-2xl border border-gray-800 w-full" />
                                <div className="absolute -bottom-10 -right-10 z-20 bg-brand-card p-4 rounded-xl border border-gray-800 shadow-xl hidden md:block">
                                    <img src="PORTATILES/IA 2.jpg" alt="Device" className="w-48 rounded-lg" />
                                </div>
                            </div>
                            
                            {/* Text Side */}
                            <div className="lg:pl-10">
                                <div className="mb-2 text-brand-blue text-sm font-semibold tracking-wider">TECNOLOGÍA</div>
                                <h2 className="font-display font-bold text-4xl leading-tight text-white mb-6">
                                    Brinde seguridad sin comprar equipos
                                </h2>
                                <p className="text-gray-400 mb-8 max-w-lg">
                                    Obtenga potencia informática especializada para sus centros de control. Computadoras Gamers y de IA capaces de ejecutar reconocimiento facial multicámara, al alcance de su mano.
                                </p>
                                <button className="bg-brand-blue hover:bg-blue-600 text-white px-8 py-3 rounded-full font-medium transition cursor-pointer">
                                    Más información
                                </button>
                            </div>
                        </div>

                        {/* Large wide image showcase */}
                        <div className="mt-32 relative rounded-3xl overflow-hidden border border-gray-800">
                            <img src="PORTATILES/GAMER 1.jpg" alt="Multi-screen setup" className="w-full object-cover max-h-[500px]" />
                            <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent flex items-end">
                                <div className="p-8 md:p-12 w-full flex flex-col md:flex-row justify-between items-end gap-6">
                                   <div>
                                       <h3 className="text-3xl md:text-4xl font-display font-bold text-white mb-2">Puede confiar en nosotros para su seguridad</h3>
                                       <p className="text-gray-300 max-w-md">Supervisión en tiempo real con especificaciones de alto rendimiento que nunca se congelan bajo carga.</p>
                                   </div>
                                   <div className="flex gap-10">
                                        <div className="text-center">
                                            <div className="text-3xl font-bold text-white mb-1">99.9%</div>
                                            <div className="text-xs text-brand-blue uppercase tracking-wider">Tiempo activo</div>
                                        </div>
                                        <div className="text-center">
                                            <div className="text-3xl font-bold text-white mb-1">24/7</div>
                                            <div className="text-xs text-brand-blue uppercase tracking-wider">Soporte</div>
                                        </div>
                                   </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const Testimonials = () => {
            return (
                <section className="py-24 bg-brand-dark">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                        <h2 className="font-display font-bold text-3xl text-white mb-16">Gracias por sus reseñas</h2>
                        
                        <div className="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                            <div className="bg-brand-card border border-gray-800 p-10 rounded-2xl text-left relative group hover:border-gray-600 transition">
                                <div className="text-brand-blue text-4xl font-serif absolute top-8 left-8 opacity-50">"</div>
                                <p className="text-gray-400 italic mb-8 relative z-10 mt-6">
                                    Sus cámaras solares son increíbles. Incluso durante la temporada de lluvias, el tiempo de actividad fue impecable. El equipo de instalación fue profesional y rápido.
                                </p>
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 bg-gray-700 rounded-full flex items-center justify-center text-white font-bold">JD</div>
                                    <div>
                                        <h4 className="text-white font-medium">Javier Díaz</h4>
                                        <div className="flex text-yellow-500 text-sm">★★★★★</div>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="bg-brand-card border border-gray-800 p-10 rounded-2xl text-left relative group hover:border-gray-600 transition">
                                <div className="text-brand-blue text-4xl font-serif absolute top-8 left-8 opacity-50">"</div>
                                <p className="text-gray-400 italic mb-8 relative z-10 mt-6">
                                    Compramos 5 portátiles de gama alta para nuestras estaciones de monitoreo. TSZ ofreció una consultoría específica que nos ahorró dinero y nos dio el rendimiento exacto que necesitábamos.
                                </p>
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 bg-gray-700 rounded-full flex items-center justify-center text-white font-bold">MC</div>
                                    <div>
                                        <h4 className="text-white font-medium">María Camila</h4>
                                        <div className="flex text-yellow-500 text-sm">★★★★★</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const ContactBand = () => {
            return (
                <div className="bg-brand-blue py-12">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
                        <h2 className="text-white font-display font-bold text-2xl md:text-3xl">¡Asegure un bono de consulta individual!</h2>
                        <div className="flex w-full md:w-auto">
                            <input type="email" placeholder="Tu correo electrónico" className="px-6 py-4 rounded-l-full w-full md:w-80 outline-none text-black" />
                            <button className="bg-brand-dark hover:bg-black text-white px-8 py-4 rounded-r-full font-semibold transition whitespace-nowrap">
                                Enviar
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const FAQ = () => {
            const faqs = [
                "¿Instalación en lugares oscuros sin red?",
                "¿Qué tipo de equipo garantiza el rendimiento?",
                "¿Garantía para sus dispositivos reparados?",
                "¿Hacen envíos al por mayor?"
            ];

            return (
                <section className="py-24 bg-brand-dark overflow-hidden">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex flex-col lg:flex-row gap-16 items-center">
                            <div className="w-full lg:w-1/2">
                                <img src="Solar/4.jpg" alt="Security Camera" className="rounded-2xl border border-gray-800 shadow-2xl w-full max-h-[600px] object-cover" />
                            </div>
                            <div className="w-full lg:w-1/2">
                                <h2 className="font-display font-bold text-3xl md:text-4xl text-white mb-10">Respuestas a preguntas frecuentes</h2>
                                <div className="space-y-4">
                                    {faqs.map((q, idx) => (
                                        <div key={idx} className="border-b border-gray-800 py-5 flex justify-between items-center cursor-pointer group hover:border-gray-600 transition">
                                            <span className="text-gray-300 font-medium group-hover:text-white transition">{q}</span>
                                            <Plus className="text-brand-blue w-5 h-5 group-hover:rotate-90 transition duration-300" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const MapSection = () => {
            return (
                <section className="py-24 bg-[#0a0d14] relative border-t border-gray-800">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center pb-12">
                        <h2 className="font-display font-bold text-3xl md:text-4xl text-white mb-6">Trabajamos en estas ciudades</h2>
                        <div className="flex justify-center gap-12 text-sm">
                            <div className="flex items-center gap-2"><div className="w-3 h-3 bg-brand-blue rounded-full"></div> <span className="text-gray-400">Medellín</span></div>
                            <div className="flex items-center gap-2"><div className="w-3 h-3 bg-brand-blue rounded-full"></div> <span className="text-gray-400">Bogotá</span></div>
                            <div className="flex items-center gap-2"><div className="w-3 h-3 bg-gray-600 rounded-full"></div> <span className="text-gray-400">Cali</span></div>
                        </div>
                    </div>
                    {/* Dark map abstraction */}
                    <div className="max-w-6xl mx-auto h-[400px] bg-brand-card/50 rounded-3xl border border-gray-800 relative overflow-hidden flex items-center justify-center">
                        <Map className="w-full h-full text-gray-800/20 absolute inset-0 mix-blend-overlay p-4" strokeWidth={0.5}/>
                        <div className="absolute top-1/3 left-1/3 w-4 h-4 bg-brand-blue rounded-full shadow-[0_0_20px_#0055ff] flex items-center justify-center">
                             <div className="w-2 h-2 bg-white rounded-full animate-ping"></div>
                        </div>
                        <div className="absolute top-1/2 left-2/3 w-4 h-4 bg-brand-blue rounded-full shadow-[0_0_20px_#0055ff] flex items-center justify-center">
                             <div className="w-2 h-2 bg-white rounded-full animate-ping"></div>
                        </div>
                    </div>
                </section>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-black py-12 border-t border-gray-800">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div className="flex items-center gap-2">
                             <Shield className="w-6 h-6 text-brand-blue" />
                             <span className="font-display font-bold text-xl text-white">TSZ</span>
                        </div>
                        <p className="text-gray-600 text-sm">© 2026 Tecnologías TSZ. Todos los derechos reservados.</p>
                        <div className="flex gap-4">
                             <a href="#" className="text-gray-600 hover:text-white transition">Política de Privacidad</a>
                             <a href="#" className="text-gray-600 hover:text-white transition">Términos de Servicio</a>
                        </div>
                    </div>
                </footer>
            );
        };

        const LandingPage = () => {
            return (
                <main className="min-h-screen">
                    <Nav />
                    <Hero />
                    <Services />
                    <ControlCenterFeature />
                    <Testimonials />
                    <ContactBand />
                    <FAQ />
                    <MapSection />
                    <Footer />
                </main>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<LandingPage />);
    </script>
</body>
</html>
